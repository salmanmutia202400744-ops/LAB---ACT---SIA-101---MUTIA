<!DOCTYPE html>
<html>
<head>
  <title>Student Records Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎓 Student Records Viewer</h1>
    <button class="secondary" onclick="loadStudents()">Refresh</button>
  </div>

  <div class="stats">
    <div class="card"><h3>Total Students</h3><p id="total">0</p></div>
    <div class="card"><h3>Regular</h3><p id="regularCount">0</p></div>
    <div class="card"><h3>Courses</h3><p id="courses">0</p></div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search student name">
    <button onclick="searchStudent()">Search</button>
    <button onclick="loadStudents()">Show All</button>
    <button onclick="loadRandom()">Random</button>
  </div>

  <ul id="studentList"></ul>

  <h2>Add / Update Student</h2>
  <div class="form-grid">
    <input id="studentId" placeholder="ID for update (optional)">
    <input id="name" placeholder="Name">
    <input id="course" placeholder="Course">
    <input id="yearLevel" placeholder="Year Level">
    <input id="age" placeholder="Age">
    <select id="status"><option>Regular</option><option>Irregular</option></select>
    <button onclick="saveStudent()">Save Student</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
